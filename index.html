<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no"/>
<title>Swing Clipper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c100e;--panel:#141b18;--panel-2:#1b231f;--line:#28332d;--ink:#e9efeb;--muted:#8a968f;--impact:#b8ff3c;--armed:#f5a623;--danger:#ff6b5e;--radius:16px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;overscroll-behavior:none;}
body{display:flex;flex-direction:column;min-height:100dvh;}
header{display:flex;align-items:center;justify-content:space-between;padding:max(10px,env(safe-area-inset-top)) 14px 0;background:var(--panel);border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding-bottom:10px;}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:none;}
.brand .dot.live{background:var(--impact);animation:pulse 1.6s infinite;}
.ver{font-size:11px;font-weight:600;color:var(--impact);background:rgba(184,255,60,.15);border:1px solid rgba(184,255,60,.35);border-radius:999px;padding:2px 8px;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(184,255,60,.45)}70%{box-shadow:0 0 0 10px rgba(184,255,60,0)}100%{box-shadow:0 0 0 0 rgba(184,255,60,0)}}
.tabs{display:flex;gap:2px;}
.tab-btn{font-family:inherit;font-weight:600;font-size:14px;background:transparent;border:none;color:var(--muted);padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
.tab-btn.active{color:var(--impact);border-bottom-color:var(--impact);}
.pane{display:flex;flex-direction:column;flex:1;min-height:0;overflow-y:auto;}
.pane.hidden{display:none!important;}
/* 録画タブ */
.stage{position:relative;flex:1;min-height:200px;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#video{width:100%;height:100%;object-fit:cover;background:#000;display:block;}
.stage.empty #video{display:none;}
.placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px;color:var(--muted);}
.stage:not(.empty) .placeholder{display:none;}
.sts{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:8px;background:rgba(8,12,10,.65);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:999px;padding:7px 13px 7px 11px;font-size:13px;font-weight:600;}
.sts .sd{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.sts.armed .sd{background:var(--armed);}
.sts.rec .sd{background:var(--impact);animation:pulse 1s infinite;}
.sts .cd{font-family:"JetBrains Mono",monospace;color:var(--muted);font-weight:700;font-size:12px;}
.gauge{position:absolute;right:12px;top:12px;bottom:96px;width:14px;background:rgba(8,12,10,.5);border:1px solid var(--line);border-radius:999px;overflow:hidden;display:flex;flex-direction:column-reverse;}
.gauge .fill{width:100%;background:linear-gradient(180deg,var(--impact),#5fae1e);height:0%;transition:height .06s linear;}
.gauge .mark{position:absolute;left:-5px;right:-5px;height:2px;background:var(--armed);box-shadow:0 0 6px var(--armed);}
.gauge.empty{display:none;}
.flash{position:absolute;inset:0;background:var(--impact);opacity:0;pointer-events:none;}
.flash.on{animation:fls .35s ease-out;}
@keyframes fls{0%{opacity:.32}100%{opacity:0}}
.controls{display:flex;flex-direction:column;gap:12px;padding:14px 16px;background:var(--panel);border-top:1px solid var(--line);}
.row{display:flex;gap:10px;}
button{font-family:inherit;font-weight:600;border-radius:var(--radius);color:var(--ink);background:var(--panel-2);border:1px solid var(--line);padding:13px 14px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;flex:1;transition:transform .08s,background .15s;}
button:active{transform:scale(.97);}
button:disabled{opacity:.4;pointer-events:none;}
.btn-primary{background:var(--impact);color:#0c1407;border-color:var(--impact);font-weight:700;flex:2;}
.btn-stop{background:transparent;color:var(--danger);border-color:rgba(255,107,94,.45);}
.btn-cap{background:transparent;border-color:var(--line);}
.icon{width:18px;height:18px;flex:none;}
.opts{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding-top:2px;font-size:13px;color:var(--muted);}
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.switch{width:40px;height:23px;border-radius:999px;background:var(--panel-2);border:1px solid var(--line);position:relative;transition:background .15s;flex:none;}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:var(--muted);transition:transform .15s,background .15s;}
.toggle.on .switch{background:rgba(184,255,60,.25);border-color:var(--impact);}
.toggle.on .switch::after{transform:translateX(17px);background:var(--impact);}
.toggle.on span{color:var(--ink);}
.slider-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:160px;}
.slider-wrap label{font-size:13px;color:var(--muted);white-space:nowrap;}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:999px;background:var(--line);flex:1;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--impact);border:3px solid var(--bg);cursor:pointer;}
.val{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ink);width:26px;text-align:right;}
.clips{padding:8px 16px max(18px,env(safe-area-inset-bottom));background:var(--bg);}
.clips-head{display:flex;align-items:center;justify-content:space-between;padding:10px 2px 12px;}
.clips-head h2{margin:0;font-size:14px;font-weight:700;}
.clips-head .count{font-family:"JetBrains Mono",monospace;color:var(--muted);font-size:12px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.clip{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
.clip .thumb{position:relative;aspect-ratio:3/4;background:#000;}
.clip .thumb video{width:100%;height:100%;object-fit:cover;}
.clip .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.clip .play svg{width:46px;height:46px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));opacity:.92}
.clip .meta{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;font-size:12px;}
.clip .meta .t{font-family:"JetBrains Mono",monospace;color:var(--muted);}
.clip .acts{display:flex;gap:5px;padding:0 8px 8px;}
.clip .acts button{flex:1;padding:8px 6px;font-size:12px;border-radius:10px;}
.clip .acts .save{background:var(--impact);color:#0c1407;border-color:var(--impact);font-weight:700;}
.clip .acts .analyze{background:rgba(184,255,60,.12);color:var(--impact);border-color:rgba(184,255,60,.3);}
.clip .acts .del{background:transparent;color:var(--muted);border-color:var(--line);flex:0 0 40px;}
.empty-clips{color:var(--muted);font-size:13px;text-align:center;padding:26px 0 30px;line-height:1.6;}
/* 分析タブ */
.ana-upload{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px 20px;}
.u-box{border:2px dashed var(--line);border-radius:20px;padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:380px;cursor:pointer;text-align:center;transition:border-color .2s;}
.u-box:active{border-color:var(--impact);}
.u-note{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.35);color:#fde8b0;border-radius:12px;padding:10px 14px;font-size:13px;line-height:1.55;max-width:380px;width:100%;text-align:left;}
.u-btn{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:11px 24px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit;}
.ana-stage{position:relative;flex:1;min-height:220px;background:#000;overflow:hidden;touch-action:none;}
#anaVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;pointer-events:none;}
#anaCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
.ana-playbar{display:flex;flex-direction:column;gap:7px;padding:9px 13px;background:var(--panel);border-top:1px solid var(--line);}
.seek-row{display:flex;align-items:center;gap:9px;}
.seek-row input{flex:1;}
.ana-time{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);white-space:nowrap;min-width:56px;text-align:right;}
.pbtn-row{display:flex;gap:5px;align-items:center;}
.play-pause{flex:0 0 46px;font-size:17px;padding:9px;}
.speed-btn{flex:1;padding:9px 4px;font-size:12px;border-radius:10px;}
.speed-btn.active{background:rgba(184,255,60,.18);color:var(--impact);border-color:rgba(184,255,60,.4);}
.step-row{display:flex;gap:5px;align-items:center;}
.step-lbl{font-size:11px;color:var(--muted);white-space:nowrap;flex:none;}
.step-btn{flex:1;padding:9px 4px;font-size:12px;border-radius:10px;}
.step-btn.active{background:rgba(184,255,60,.18);color:var(--impact);border-color:rgba(184,255,60,.4);}
.frame-nav{flex:0 0 42px;padding:9px;font-size:17px;border-radius:10px;}
.ios-note{font-size:11px;color:var(--muted);padding:1px 2px 0;}
.ana-tools{display:flex;align-items:center;gap:7px;padding:9px 13px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap;}
.tool-group{display:flex;gap:4px;}
.tool-btn{flex:0 0 40px;padding:9px;font-size:17px;border-radius:11px;}
.tool-btn.active{background:rgba(184,255,60,.18);color:var(--impact);border-color:rgba(184,255,60,.4);}
.color-group{display:flex;gap:5px;margin-left:2px;}
.color-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);cursor:pointer;flex:none;transition:transform .1s,border-color .15s;}
.color-dot.active{border-color:#fff;transform:scale(1.2);}
.ana-spacer{flex:1;}
.act-group{display:flex;gap:4px;}
.act-btn{padding:9px 11px;font-size:12px;border-radius:11px;flex:none;}
.act-btn.danger{color:var(--danger);border-color:rgba(255,107,94,.35);}
.sel-del{display:none;}
.sel-del.show{display:flex;}
.ana-track{padding:9px 13px max(10px,env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid var(--line);display:flex;flex-direction:column;gap:7px;}
.track-state{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.track-big{background:rgba(184,255,60,.12);color:var(--impact);border:1px solid rgba(184,255,60,.4);padding:11px 18px;border-radius:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;flex:none;}
.track-big:active{transform:scale(.97);}
.progress-wrap{background:var(--panel-2);border-radius:999px;height:7px;overflow:hidden;flex:1;}
.progress-fill{height:100%;background:var(--impact);width:0%;transition:width .4s;border-radius:999px;}
.prog-txt{font-size:12px;color:var(--muted);font-family:"JetBrains Mono",monospace;}
.warn{background:rgba(255,107,94,.1);border:1px solid rgba(255,107,94,.4);color:#ffd7d2;border-radius:12px;padding:11px 13px;font-size:13px;line-height:1.5;margin:10px 14px 0;}
.hidden{display:none!important;}
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="dot" id="liveDot"></span>
    Swing Clipper
    <span class="ver">v1.1</span>
  </div>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="rec">録画</button>
    <button class="tab-btn" data-tab="ana">分析</button>
  </nav>
</header>

<!-- 録画タブ -->
<div class="pane" id="pane-rec">
  <div id="compatWarn" class="warn hidden"></div>
  <div class="stage empty" id="stage">
    <video id="video" playsinline muted autoplay></video>
    <div class="placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M14 6l7-3v15l-7-3"/><circle cx="8.5" cy="13.5" r="6.5"/></svg>
      <div>三脚にセットして<br><b style="color:var(--ink)">カメラを開始</b>を押してください</div>
    </div>
    <div class="sts" id="status"><span class="sd"></span><span id="statusText">停止中</span><span class="cd" id="cd"></span></div>
    <div class="gauge empty" id="gauge"><div class="fill" id="gaugeFill"></div><div class="mark" id="gaugeMark"></div></div>
    <div class="flash" id="flash"></div>
  </div>
  <div class="controls">
    <div class="row">
      <button class="btn-primary" id="startBtn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>カメラを開始</button>
      <button class="btn-cap" id="flipBtn" disabled><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0114.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0020.5 15"/></svg>切替</button>
    </div>
    <div class="row">
      <button class="btn-cap" id="manualBtn" disabled><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.5" fill="currentColor" stroke="none"/></svg>今のスイングを切り出す</button>
      <button class="btn-stop hidden" id="stopBtn">停止</button>
    </div>
    <div class="opts">
      <div class="toggle on" id="autoToggle"><span class="switch"></span><span>自動検知</span></div>
      <div class="slider-wrap"><label>感度</label><input type="range" id="sens" min="1" max="10" value="6"><span class="val" id="sensVal">6</span></div>
    </div>
    <div class="opts">
      <div class="slider-wrap"><label>巻き戻し</label><input type="range" id="preroll" min="15" max="38" value="26"><span class="val" id="prerollVal">2.6s</span></div>
    </div>
  </div>
  <div class="clips">
    <div class="clips-head"><h2>スイング</h2><span class="count" id="clipCount">0</span></div>
    <div class="grid hidden" id="grid"></div>
    <div class="empty-clips" id="emptyClips">スイングを検知すると、ここに1本ずつたまります。<br>各クリップの「保存」で写真アプリに残せます。</div>
  </div>
</div>

<!-- 分析タブ -->
<div class="pane hidden" id="pane-ana">
  <div class="ana-upload" id="anaUpload">
    <div class="u-box" id="dropZone">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" color="var(--muted)"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p style="margin:0;font-size:14px;color:var(--muted)">動画をアップロード</p>
      <button class="u-btn" id="pickVideoBtn">写真・ファイルから選択</button>
    </div>
    <div class="u-note">📷 <b>後方アングル推奨</b>（ゴルファーの後ろ斜め下から撮影）。正面アングルでも利用できますが、ヘッド自動解析の精度は後方の方が高くなります。</div>
  </div>
  <input type="file" id="videoFileInput" accept="video/*" hidden>

  <div class="ana-stage hidden" id="anaStage">
    <video id="anaVideo" playsinline></video>
    <canvas id="anaCanvas"></canvas>
  </div>

  <div class="ana-playbar hidden" id="anaPlaybar">
    <div class="seek-row">
      <input type="range" id="anaSeek" min="0" max="1000" value="0" step="1">
      <span class="ana-time" id="anaTime">0:00.0</span>
    </div>
    <div class="pbtn-row">
      <button class="play-pause" id="anaPlayBtn">▶</button>
      <button class="speed-btn active" data-rate="1">1x</button>
      <button class="speed-btn" data-rate="0.5">1/2</button>
      <button class="speed-btn" data-rate="0.33">1/3</button>
      <button class="speed-btn" data-rate="0.2">1/5</button>
      <button class="speed-btn" data-rate="0.1">1/10</button>
    </div>
    <div class="step-row">
      <span class="step-lbl">送り幅:</span>
      <button class="step-btn active" data-step="0.1">1/10s</button>
      <button class="step-btn" data-step="0.2">1/5s</button>
      <button class="step-btn" data-step="0.333">1/3s</button>
      <button class="frame-nav" id="prevFrameBtn">◀</button>
      <button class="frame-nav" id="nextFrameBtn">▶</button>
    </div>
    <div class="ios-note" id="iosNote" style="display:none">⚠ iOSは1/5以下が下限になる場合があります</div>
  </div>

  <div class="ana-tools hidden" id="anaTools">
    <div class="tool-group">
      <button class="tool-btn active" data-tool="cursor" title="選択・編集">↖</button>
      <button class="tool-btn" data-tool="line" title="直線">╱</button>
      <button class="tool-btn" data-tool="circle" title="円">○</button>
    </div>
    <div class="color-group">
      <div class="color-dot active" data-color="#ef4444" style="background:#ef4444"></div>
      <div class="color-dot" data-color="#3b82f6" style="background:#3b82f6"></div>
      <div class="color-dot" data-color="#22c55e" style="background:#22c55e"></div>
      <div class="color-dot" data-color="#eab308" style="background:#eab308"></div>
    </div>
    <div class="ana-spacer"></div>
    <div class="act-group">
      <button class="act-btn sel-del danger" id="selDelBtn">✕ 削除</button>
      <button class="act-btn" id="undoBtn">↩</button>
      <button class="act-btn danger" id="clearAllBtn">全消去</button>
      <button class="act-btn" id="changeVideoBtn" style="color:var(--muted)">動画変更</button>
    </div>
  </div>

  <div class="ana-track hidden" id="anaTrackPanel">
    <div class="track-state" id="trackIdle">
      <button class="track-big" id="startTrackBtn">🎯 ヘッドを自動解析</button>
      <span style="font-size:12px;color:var(--muted)">Claude Vision APIで軌跡を自動描画します</span>
    </div>
    <div class="track-state hidden" id="trackInit">
      <span style="font-size:13px;color:var(--impact)">ヘッドの位置をタップ →</span>
      <button class="act-btn" id="startAnalysisBtn" disabled style="background:var(--impact);color:#0c1407;border-color:var(--impact);font-weight:700">解析開始</button>
      <button class="act-btn" id="cancelInitBtn" style="color:var(--muted)">キャンセル</button>
    </div>
    <div class="track-state hidden" id="trackAnalyzing">
      <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
      <span class="prog-txt" id="progressText">解析中...</span>
      <button class="act-btn danger" id="cancelAnalysisBtn">中止</button>
    </div>
    <div class="track-state hidden" id="trackDone">
      <button class="track-big" id="reAnalyzeBtn">🔄 再解析</button>
      <button class="act-btn" id="clearTrackBtn">軌跡クリア</button>
    </div>
  </div>
</div>

<script>
"use strict";
const $=id=>document.getElementById(id);

// ===== タブ切替 =====
document.querySelectorAll(".tab-btn").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".pane").forEach(x=>x.classList.add("hidden"));
    b.classList.add("active");
    $("pane-"+b.dataset.tab).classList.remove("hidden");
  };
});

// ===== 録画タブ =====
const TARGET_MAX_DIM=540,BUF_FPS=18,POST_MS=1500,POST_FPS=25,COOLDOWN_MS=1500,MAX_CLIPS=12;
const els={stage:$("stage"),video:$("video"),status:$("status"),statusText:$("statusText"),cd:$("cd"),gauge:$("gauge"),gaugeFill:$("gaugeFill"),gaugeMark:$("gaugeMark"),flash:$("flash"),startBtn:$("startBtn"),flipBtn:$("flipBtn"),manualBtn:$("manualBtn"),stopBtn:$("stopBtn"),autoToggle:$("autoToggle"),sens:$("sens"),sensVal:$("sensVal"),preroll:$("preroll"),prerollVal:$("prerollVal"),grid:$("grid"),emptyClips:$("emptyClips"),clipCount:$("clipCount"),liveDot:$("liveDot"),compatWarn:$("compatWarn")};
let stream=null,running=false,facing="environment",recMode="idle",autoDetect=true,cooldownUntil=0,rafId=null;
const aC=document.createElement("canvas");aC.width=80;aC.height=60;
const aCtx=aC.getContext("2d",{willReadFrequently:true});
let prevData=null,motion=0,motionSmooth=0;
const rC=document.createElement("canvas");const rCtx=rC.getContext("2d");
let buf=[],bufLen=0,bufHead=0,lastBufT=0,mime="";
const PREROLL_MS=()=>parseInt(els.preroll.value)*100;
function checkSupport(){
  const issues=[];
  if(!navigator.mediaDevices?.getUserMedia)issues.push("getUserMedia");
  if(typeof MediaRecorder==="undefined")issues.push("MediaRecorder");
  if(!document.createElement("canvas").captureStream)issues.push("captureStream");
  if(issues.length){els.compatWarn.classList.remove("hidden");els.compatWarn.innerHTML="非対応機能：<b>"+issues.join("・")+"</b>。";}
}

// ===== 分析タブ =====
const anaVideo=$("anaVideo"),anaCanvas=$("anaCanvas"),anaCtx2=anaCanvas.getContext("2d");

// ズーム状態
const zoom={scale:1,tx:0,ty:0};
const pinch={active:false,startDist:0,startScale:1,startTx:0,startTy:0,midX:0,midY:0};

// アノテーション状態
const ana={
  tool:"cursor",color:"#ef4444",
  trackPoints:[],annotations:[],
  drawing:null,selectedIdx:-1,dragHandle:null,
  trackState:"idle",trackInitPos:null,trackCancelFlag:false,
  dragging:false,lastNx:0,lastNy:0,
};

let stepSize=0.1; // コマ送り幅(秒)

// ----- 座標系 -----
function getVideoBaseRect(){
  const cw=anaCanvas.width,ch=anaCanvas.height;
  const vw=anaVideo.videoWidth||1,vh=anaVideo.videoHeight||1;
  const s=Math.min(cw/vw,ch/vh);
  const w=vw*s,h=vh*s;
  return{left:(cw-w)/2,top:(ch-h)/2,width:w,height:h};
}
function clientToNorm(cx,cy){
  const rect=anaCanvas.getBoundingClientRect();
  const sx=anaCanvas.width/rect.width,sy=anaCanvas.height/rect.height;
  const px=(cx-rect.left)*sx,py=(cy-rect.top)*sy;
  const bx=(px-zoom.tx)/zoom.scale,by=(py-zoom.ty)/zoom.scale;
  const b=getVideoBaseRect();
  return{nx:Math.max(0,Math.min(1,(bx-b.left)/b.width)),ny:Math.max(0,Math.min(1,(by-b.top)/b.height))};
}
function normToBase(nx,ny){const b=getVideoBaseRect();return{x:b.left+nx*b.width,y:b.top+ny*b.height};}
function getTouchDist(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.hypot(dx,dy);}

// ----- ヒット判定 -----
function distToSegPx(nx,ny,nx1,ny1,nx2,ny2,b){
  const px=nx*b.width,py=ny*b.height;
  const x1=nx1*b.width,y1=ny1*b.height,x2=nx2*b.width,y2=ny2*b.height;
  const dx=x2-x1,dy=y2-y1;const l2=dx*dx+dy*dy;
  if(l2===0)return Math.hypot(px-x1,py-y1);
  const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/l2));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}
function hitTestAnnotations(nx,ny){
  const b=getVideoBaseRect();const THR=14;
  for(let i=ana.annotations.length-1;i>=0;i--){
    const a=ana.annotations[i];
    if(a.type==="line"){if(distToSegPx(nx,ny,a.nx1,a.ny1,a.nx2,a.ny2,b)<THR)return i;}
    else if(a.type==="circle"){const dx=(nx-a.ncx)*b.width,dy=(ny-a.ncy)*b.height;const d=Math.hypot(dx,dy),r=a.nr*b.width;if(d<THR||Math.abs(d-r)<THR)return i;}
  }
  return-1;
}
function hitTestHandles(nx,ny){
  if(ana.selectedIdx<0)return null;
  const a=ana.annotations[ana.selectedIdx];const b=getVideoBaseRect();const THR=16;
  const hpx=(h,v)=>Math.hypot((nx-h)*b.width,(ny-v)*b.height);
  if(a.type==="line"){if(hpx(a.nx1,a.ny1)<THR)return"p1";if(hpx(a.nx2,a.ny2)<THR)return"p2";}
  else if(a.type==="circle"){if(hpx(a.ncx,a.ncy)<THR)return"center";if(hpx(a.ncx+a.nr,a.ncy)<THR)return"rim";}

}

// ----- RAF描画 -----
function syncCanvas(){const s=$("anaStage");const w=s.clientWidth||1,h=s.clientHeight||1;if(anaCanvas.width!==w||anaCanvas.height!==h){anaCanvas.width=w;anaCanvas.height=h;}}
function startAnaRaf(){
  if(ana.rafId)cancelAnimationFrame(ana.rafId);
  function render(){
    ana.rafId=requestAnimationFrame(render);
    syncCanvas();
    const ctx=anaCtx2;
    ctx.clearRect(0,0,anaCanvas.width,anaCanvas.height);
    ctx.save();
    ctx.translate(zoom.tx,zoom.ty);
    ctx.scale(zoom.scale,zoom.scale);
    // 動画フレーム描画
    if(anaVideo.readyState>=2){const b=getVideoBaseRect();ctx.drawImage(anaVideo,b.left,b.top,b.width,b.height);}
    // 軌跡

    if(pts.length>=2){ctx.beginPath();const p0=normToBase(pts[0].nx,pts[0].ny);ctx.moveTo(p0.x,p0.y);for(let i=1;i<pts.length;i++){const p=normToBase(pts[i].nx,pts[i].ny);ctx.lineTo(p.x,p.y);}ctx.strokeStyle=ana.color;ctx.lineWidth=3;ctx.lineJoin="round";ctx.lineCap="round";ctx.shadowColor=ana.color;ctx.shadowBlur=5;ctx.stroke();ctx.shadowBlur=0;}

      ctx.strokeStyle=a.color;ctx.lineWidth=i===ana.selectedIdx?3.5:2.5;ctx.lineCap="round";ctx.shadowColor=a.color;ctx.shadowBlur=3;

    }

    if(ana.selectedIdx>=0&&ana.selectedIdx<ana.annotations.length){
      const a=ana.annotations[ana.selectedIdx];const b=getVideoBaseRect();
      ctx.setLineDash([5,4]);ctx.strokeStyle=a.color;ctx.lineWidth=1.5;
      if(a.type==="line"){const{x:x1,y:y1}=normToBase(a.nx1,a.ny1);const{x:x2,y:y2}=normToBase(a.nx2,a.ny2);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
      else if(a.type==="circle"){const{x:cx,y:cy}=normToBase(a.ncx,a.ncy);ctx.beginPath();ctx.arc(cx,cy,Math.max(1,a.nr*b.width),0,Math.PI*2);ctx.stroke();}
      ctx.setLineDash([]);
      const handles=a.type==="line"?[{nx:a.nx1,ny:a.ny1},{nx:a.nx2,ny:a.ny2}]:[{nx:a.ncx,ny:a.ncy},{nx:a.ncx+a.nr,ny:a.ncy}];
      for(const h of handles){const{x,y}=normToBase(h.nx,h.ny);ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.strokeStyle=a.color;ctx.lineWidth=2;ctx.stroke();}
    }
    // 描画プレビュー
    if(ana.drawing){const d=ana.drawing;ctx.strokeStyle=ana.color;ctx.lineWidth=2.5;ctx.lineCap="round";ctx.setLineDash([6,4]);if(d.type==="line"){const{x:x1,y:y1}=normToBase(d.nx1,d.ny1);const{x:x2,y:y2}=normToBase(d.nx2??d.nx1,d.ny2??d.ny1);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}else if(d.type==="circle"){const{x:cx,y:cy}=normToBase(d.ncx,d.ncy);const b=getVideoBaseRect();ctx.beginPath();ctx.arc(cx,cy,Math.max(1,(d.nr??0)*b.width),0,Math.PI*2);ctx.stroke();}ctx.setLineDash([]);}

    ctx.restore();
    // 追跡initヒント（ズーム外・固定位置）
    if(ana.trackState==="init"){ctx.fillStyle="rgba(8,12,10,.78)";ctx.fillRect(0,anaCanvas.height-52,anaCanvas.width,52);ctx.fillStyle="#b8ff3c";ctx.font="bold 13px Inter";ctx.textAlign="center";ctx.fillText(ana.trackInitPos?"タップ位置を確認 → 解析開始":"クラブヘッドをタップしてください",anaCanvas.width/2,anaCanvas.height-20);}
    updateAnaTime();
  }
  render();
}
function updateAnaTime(){if(!isNaN(anaVideo.duration)&&anaVideo.duration>0){$("anaSeek").value=(anaVideo.currentTime/anaVideo.duration)*1000;const m=Math.floor(anaVideo.currentTime/60),s=(anaVideo.currentTime%60).toFixed(1).padStart(4,"0");$("anaTime").textContent=`${m}:${s}`;}}

// ----- ピンチズーム -----
anaCanvas.addEventListener("touchstart",e=>{
  if(e.touches.length===2){e.preventDefault();pinch.active=true;pinch.startDist=getTouchDist(e.touches);pinch.startScale=zoom.scale;pinch.startTx=zoom.tx;pinch.startTy=zoom.ty;const rect=anaCanvas.getBoundingClientRect();const sx=anaCanvas.width/rect.width,sy=anaCanvas.height/rect.height;pinch.midX=((e.touches[0].clientX+e.touches[1].clientX)/2-rect.left)*sx;pinch.midY=((e.touches[0].clientY+e.touches[1].clientY)/2-rect.top)*sy;}
},{passive:false});
anaCanvas.addEventListener("touchmove",e=>{
  if(pinch.active&&e.touches.length===2){e.preventDefault();const nd=getTouchDist(e.touches);const ns=Math.max(1,Math.min(5,pinch.startScale*(nd/pinch.startDist)));const ratio=ns/pinch.startScale;zoom.tx=pinch.midX-(pinch.midX-pinch.startTx)*ratio;zoom.ty=pinch.midY-(pinch.midY-pinch.startTy)*ratio;zoom.scale=ns;}
},{passive:false});
anaCanvas.addEventListener("touchend",e=>{if(e.touches.length<2)pinch.active=false;});

// ----- ポインタイベント（描画・選択） -----
function getEvtXY(e){return e.touches&&e.touches.length>0?{cx:e.touches[0].clientX,cy:e.touches[0].clientY}:{cx:e.clientX,cy:e.clientY};}

anaCanvas.addEventListener("pointerdown",e=>{
  if(pinch.active)return;e.preventDefault();
  const{cx,cy}=getEvtXY(e);const{nx,ny}=clientToNorm(cx,cy);
  ana.lastNx=nx;ana.lastNy=ny;
  // 追跡init中はタップで位置セット
  if(ana.trackState==="init"){ana.trackInitPos={nx,ny};$("startAnalysisBtn").disabled=false;return;}
  if(ana.tool==="cursor"){
    const handle=hitTestHandles(nx,ny);
    if(handle){ana.dragHandle=handle;ana.dragging=true;return;}
    const idx=hitTestAnnotations(nx,ny);
    if(idx>=0){ana.selectedIdx=idx;updateSelDeleteBtn();ana.dragging=false;return;}
    ana.selectedIdx=-1;updateSelDeleteBtn();
  }else if(ana.tool==="line"){ana.drawing={type:"line",nx1:nx,ny1:ny,nx2:nx,ny2:ny};ana.dragging=true;}
  else if(ana.tool==="circle"){ana.drawing={type:"circle",ncx:nx,ncy:ny,nr:0};ana.dragging=true;}
},{passive:false});

anaCanvas.addEventListener("pointermove",e=>{
  if(pinch.active)return;e.preventDefault();
  const{cx,cy}=getEvtXY(e);const{nx,ny}=clientToNorm(cx,cy);
  if(ana.tool==="cursor"&&ana.dragging&&ana.dragHandle&&ana.selectedIdx>=0){
    const a=ana.annotations[ana.selectedIdx];const dnx=nx-ana.lastNx,dny=ny-ana.lastNy;
    if(a.type==="line"){if(ana.dragHandle==="p1"){a.nx1+=dnx;a.ny1+=dny;}else if(ana.dragHandle==="p2"){a.nx2+=dnx;a.ny2+=dny;}}
    else if(a.type==="circle"){if(ana.dragHandle==="center"){a.ncx+=dnx;a.ncy+=dny;}else if(ana.dragHandle==="rim"){const b=getVideoBaseRect();const dx=(nx-a.ncx)*b.width,dy=(ny-a.ncy)*b.height;a.nr=Math.hypot(dx,dy)/b.width;}}
  }else if(ana.drawing){
    if(ana.drawing.type==="line"){ana.drawing.nx2=nx;ana.drawing.ny2=ny;}
    else if(ana.drawing.type==="circle"){const b=getVideoBaseRect();const dx=(nx-ana.drawing.ncx)*b.width,dy=(ny-ana.drawing.ncy)*b.height;ana.drawing.nr=Math.hypot(dx,dy)/b.width;}
  }
  ana.lastNx=nx;ana.lastNy=ny;
},{passive:false});

anaCanvas.addEventListener("pointerup",e=>{
  e.preventDefault();
  ana.dragging=false;ana.dragHandle=null;
  if(ana.drawing){
    const b=getVideoBaseRect();let ok=false;
    if(ana.drawing.type==="line"){const dx=(ana.drawing.nx2-ana.drawing.nx1)*b.width,dy=(ana.drawing.ny2-ana.drawing.ny1)*b.height;ok=Math.hypot(dx,dy)>6;}
    else if(ana.drawing.type==="circle")ok=(ana.drawing.nr??0)*b.width>5;
    if(ok)ana.annotations.push({...ana.drawing,color:ana.color});
    ana.drawing=null;
  }
},{passive:false});
anaCanvas.addEventListener("pointercancel",()=>{ana.dragging=false;ana.dragHandle=null;ana.drawing=null;});

// ----- ツール・カラー -----
document.querySelectorAll(".tool-btn").forEach(b=>{b.onclick=()=>{ana.tool=b.dataset.tool;document.querySelectorAll(".tool-btn").forEach(x=>x.classList.toggle("active",x===b));};});
document.querySelectorAll(".color-dot").forEach(d=>{d.onclick=()=>{ana.color=d.dataset.color;document.querySelectorAll(".color-dot").forEach(x=>x.classList.toggle("active",x===d));};});
function updateSelDeleteBtn(){$("selDelBtn").classList.toggle("show",ana.selectedIdx>=0);}
$("selDelBtn").onclick=()=>{if(ana.selectedIdx>=0){ana.annotations.splice(ana.selectedIdx,1);ana.selectedIdx=-1;updateSelDeleteBtn();}};
$("undoBtn").onclick=()=>{if(ana.annotations.length>0)ana.annotations.pop();else if(ana.trackPoints.length>0)ana.trackPoints.pop();};
$("clearAllBtn").onclick=()=>{if(confirm("アノテーションと軌跡をすべて消去しますか？")){ana.annotations=[];ana.trackPoints=[];ana.selectedIdx=-1;updateSelDeleteBtn();}};

// ----- 再生コントロール -----
$("anaPlayBtn").onclick=()=>{if(anaVideo.paused)anaVideo.play();else anaVideo.pause();};
anaVideo.onplay=()=>$("anaPlayBtn").textContent="⏸";
anaVideo.onpause=anaVideo.onended=()=>$("anaPlayBtn").textContent="▶";
$("anaSeek").oninput=()=>{if(!isNaN(anaVideo.duration))anaVideo.currentTime=(parseInt($("anaSeek").value)/1000)*anaVideo.duration;};
document.querySelectorAll(".speed-btn").forEach(b=>{b.onclick=()=>{anaVideo.playbackRate=parseFloat(b.dataset.rate);document.querySelectorAll(".speed-btn").forEach(x=>x.classList.toggle("active",x===b));};});
document.querySelectorAll(".step-btn").forEach(b=>{b.onclick=()=>{stepSize=parseFloat(b.dataset.step);document.querySelectorAll(".step-btn").forEach(x=>x.classList.toggle("active",x===b));};});
$("prevFrameBtn").onclick=()=>{anaVideo.pause();anaVideo.currentTime=Math.max(0,anaVideo.currentTime-stepSize);};
$("nextFrameBtn").onclick=()=>{anaVideo.pause();const n=anaVideo.currentTime+stepSize;anaVideo.currentTime=n>anaVideo.duration?anaVideo.duration:n;};

// ----- 追跡ステート管理 -----
function setTrackState(state){
  ana.trackState=state;
  ["trackIdle","trackInit","trackAnalyzing","trackDone"].forEach(id=>$(id).classList.add("hidden"));
  $({idle:"trackIdle",init:"trackInit",analyzing:"trackAnalyzing",done:"trackDone"}[state]).classList.remove("hidden");
  // init中はcanvasカーソルを変える
  anaCanvas.style.cursor=state==="init"?"crosshair":"default";
}
$("startTrackBtn").onclick=()=>{ana.trackInitPos=null;$("startAnalysisBtn").disabled=true;setTrackState("init");};
$("cancelInitBtn").onclick=()=>{setTrackState("idle");};
$("reAnalyzeBtn").onclick=()=>{ana.trackInitPos=null;$("startAnalysisBtn").disabled=true;setTrackState("init");};
$("clearTrackBtn").onclick=()=>{ana.trackPoints=[];setTrackState("idle");};

// ----- Claude Vision API ヘッド解析 -----
async function extractFrameAt(time){
  return new Promise(resolve=>{
    const onSeeked=()=>{anaVideo.removeEventListener("seeked",onSeeked);const c=document.createElement("canvas");const ar=anaVideo.videoHeight/anaVideo.videoWidth;c.width=320;c.height=Math.round(320*ar);c.getContext("2d").drawImage(anaVideo,0,0,c.width,c.height);resolve(c.toDataURL("image/jpeg",.72));};
    anaVideo.addEventListener("seeked",onSeeked,{once:true});
    anaVideo.currentTime=time;
  });
}
async function queryClaudeForHead(dataUrl,prevPos){
  const b64=dataUrl.split(",")[1];
  const ctx_msg=prevPos?`前のフレームでのヘッド位置は約 x=${prevPos.nx.toFixed(2)}, y=${prevPos.ny.toFixed(2)} でした。`:"";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:80,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:`ゴルフスイングの動画フレームです（後方アングル）。クラブヘッド（シャフト先端の金属部分）を探してください。${ctx_msg}\nJSONのみ返答: {"nx":0.5,"ny":0.8} (0.0〜1.0の正規化座標、左上が0,0)\n見つからない場合: {"nx":null,"ny":null}`}]}]})});
    const data=await res.json();
    const txt=(data.content?.[0]?.text||"").replace(/```json|```/g,"").trim();
    return JSON.parse(txt);
  }catch{return null;}
}
$("startAnalysisBtn").onclick=async()=>{
  if(!ana.trackInitPos)return;
  setTrackState("analyzing");ana.trackCancelFlag=false;ana.trackPoints=[];
  const savedTime=anaVideo.currentTime,dur=anaVideo.duration;
  const SAMPLES=Math.min(20,Math.max(8,Math.ceil(dur*6)));
  const interval=dur/SAMPLES;
  let prevPos=ana.trackInitPos;
  for(let i=0;i<SAMPLES;i++){
    if(ana.trackCancelFlag)break;
    const t=i*interval;
    try{
      const frameUrl=await extractFrameAt(t);
      const pos=await queryClaudeForHead(frameUrl,prevPos);
      if(pos&&pos.nx!==null&&pos.ny!==null){ana.trackPoints.push({t,nx:pos.nx,ny:pos.ny});prevPos=pos;}
    }catch(e){console.warn("frame",i,"error:",e);}
    $("progressFill").style.width=((i+1)/SAMPLES*100)+"%";
    $("progressText").textContent=`解析中 ${i+1}/${SAMPLES}`;
  }
  anaVideo.currentTime=savedTime;
  setTrackState("done");
  if(ana.trackPoints.length===0)alert("ヘッドを検出できませんでした。後方アングルか、クラブが見えているフレームをご確認ください。");
};
$("cancelAnalysisBtn").onclick=()=>{ana.trackCancelFlag=true;setTrackState("idle");};

// ----- 起動チェック -----
checkSupport();
if(window.self!==window.top){$("compatWarn").classList.remove("hidden");$("compatWarn").innerHTML="プレビュー枠ではカメラを使えません。HTMLをスマホのブラウザで直接開いてください（HTTPS推奨）。分析タブは動作確認できます。";}
</script>
