<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no"/>
<title>Swing Clipper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c100e;--panel:#141b18;--panel-2:#1b231f;--line:#28332d;--ink:#e9efeb;--muted:#8a968f;--impact:#b8ff3c;--armed:#f5a623;--danger:#ff6b5e;--radius:16px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;overscroll-behavior:none;}
body{display:flex;flex-direction:column;min-height:100dvh;}
header{display:flex;align-items:center;justify-content:space-between;padding:max(10px,env(safe-area-inset-top)) 14px 0;background:var(--panel);border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding-bottom:10px;}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:none;}
.brand .dot.live{background:var(--impact);animation:pulse 1.6s infinite;}
.ver{font-size:11px;font-weight:600;color:var(--impact);background:rgba(184,255,60,.15);border:1px solid rgba(184,255,60,.35);border-radius:999px;padding:2px 8px;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(184,255,60,.45)}70%{box-shadow:0 0 0 10px rgba(184,255,60,0)}100%{box-shadow:0 0 0 0 rgba(184,255,60,0)}}
.tabs{display:flex;gap:2px;}
.tab-btn{font-family:inherit;font-weight:600;font-size:14px;background:transparent;border:none;color:var(--muted);padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
.tab-btn.active{color:var(--impact);border-bottom-color:var(--impact);}
.pane{display:flex;flex-direction:column;flex:1;min-height:0;overflow-y:auto;}
.pane
/* v2.2 全画面UI改善 */
.fs-side{position:absolute;top:10px;right:10px;z-index:20;display:flex;flex-direction:column;gap:8px;}
.fs-side button{width:42px;height:42px;padding:0;font-size:18px;background:rgba(8,12,10,.7);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:11px;display:flex;align-items:center;justify-content:center;flex:none;}
.fs-side button.on{background:rgba(184,255,60,.2);color:var(--impact);border-color:var(--impact);}
/* 全画面ドロワー（下からスライド、自動では消えない）*/
.fs-drawer{position:absolute;bottom:0;left:0;right:0;z-index:18;background:rgba(8,12,10,.9);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px 12px max(14px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:7px;transform:translateY(0);transition:transform .25s;}
.fs-drawer.hidden-drawer{transform:translateY(105%);}
.fs-drawer-tabs{display:flex;gap:5px;margin-bottom:1px;}
.fs-dtab{flex:1;padding:7px;font-size:12px;border-radius:9px;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);font-weight:600;}
.fs-dtab.active{background:rgba(184,255,60,.15);color:var(--impact);border-color:var(--impact);}
.fs-drawer-page{display:none;flex-direction:column;gap:7px;}
.fs-drawer-page.active{display:flex;}
.fs-tool-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.fs-tool-row .tool-btn{flex:0 0 40px;}

/* v2.4 ドロワー 半透明＆コンパクト */
.fs-drawer{background:rgba(8,12,10,.55)!important;backdrop-filter:blur(9px);padding:6px 10px max(10px,env(safe-area-inset-bottom))!important;gap:5px!important;}
.fs-drawer .fs-drawer-tabs{gap:4px;margin-bottom:0;}
.fs-drawer .fs-dtab{padding:5px;font-size:11px;border-radius:8px;}
.fs-drawer-page{gap:5px!important;}
.fs-drawer .seek-row{gap:7px;}
.fs-drawer .seek-row input{height:3px;}
.fs-drawer .ana-time{font-size:11px;min-width:50px;}
.fs-drawer .pbtn-row,.fs-drawer .step-row,.fs-drawer .fs-tool-row{gap:4px;}
.fs-drawer .play-pause{flex:0 0 42px;font-size:15px;padding:6px;}
.fs-drawer .speed-btn{padding:6px 3px;font-size:11px;border-radius:8px;}
.fs-drawer .step-lbl{font-size:10px;}
.fs-drawer .step-btn{padding:6px 3px;font-size:11px;border-radius:8px;}
.fs-drawer .frame-nav{flex:0 0 38px;padding:6px;font-size:15px;border-radius:8px;}
.fs-drawer .tool-btn{flex:0 0 36px;padding:6px;font-size:15px;border-radius:9px;}
.fs-drawer .color-dot{width:24px;height:24px;}
.fs-drawer .act-btn{padding:6px 10px;font-size:11px;border-radius:9px;}
/* サイドボタンも少しコンパクトに */
.fs-side button{width:38px;height:38px;font-size:16px;background:rgba(8,12,10,.55);border-radius:10px;}
.hidden{display:none!important;}
/* 録画 */
.stage{position:relative;flex:1;min-height:200px;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#video{width:100%;height:100%;object-fit:cover;background:#000;display:block;}
.stage.empty #video{display:none;}
.placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px;color:var(--muted);}
.stage:not(.empty) .placeholder{display:none;}
.sts{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:8px;background:rgba(8,12,10,.65);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:999px;padding:7px 13px 7px 11px;font-size:13px;font-weight:600;}
.sts .sd{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.sts.armed .sd{background:var(--armed);}
.sts.rec .sd{background:var(--impact);animation:pulse 1s infinite;}
.sts .cd{font-family:"JetBrains Mono",monospace;color:var(--muted);font-weight:700;font-size:12px;}
.gauge{position:absolute;right:12px;top:12px;bottom:96px;width:14px;background:rgba(8,12,10,.5);border:1px solid var(--line);border-radius:999px;overflow:hidden;display:flex;flex-direction:column-reverse;}
.gauge .fill{width:100%;background:linear-gradient(180deg,var(--impact),#5fae1e);height:0%;transition:height .06s linear;}
.gauge .mark{position:absolute;left:-5px;right:-5px;height:2px;background:var(--armed);box-shadow:0 0 6px var(--armed);}
.gauge.empty{display:none;}
.flash{position:absolute;inset:0;background:var(--impact);opacity:0;pointer-events:none;}
.flash.on{animation:fls .35s ease-out;}
@keyframes fls{0%{opacity:.32}100%{opacity:0}}
.controls{display:flex;flex-direction:column;gap:12px;padding:14px 16px;background:var(--panel);border-top:1px solid var(--line);}
.row{display:flex;gap:10px;}
button{font-family:inherit;font-weight:600;border-radius:var(--radius);color:var(--ink);background:var(--panel-2);border:1px solid var(--line);padding:13px 14px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;flex:1;transition:transform .08s,background .15s;}
button:active{transform:scale(.97);}
button:disabled{opacity:.4;pointer-events:none;}
.btn-primary{background:var(--impact);color:#0c1407;border-color:var(--impact);font-weight:700;flex:2;}
.btn-stop{background:transparent;color:var(--danger);border-color:rgba(255,107,94,.45);}
.btn-cap{background:transparent;border-color:var(--line);}
.icon{width:18px;height:18px;flex:none;}
.opts{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding-top:2px;font-size:13px;color:var(--muted);}
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.switch{width:40px;height:23px;border-radius:999px;background:var(--panel-2);border:1px solid var(--line);position:relative;transition:background .15s;flex:none;}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:var(--muted);transition:transform .15s,background .15s;}
.toggle.on .switch{background:rgba(184,255,60,.25);border-color:var(--impact);}
.toggle.on .switch::after{transform:translateX(17px);background:var(--impact);}
.toggle.on span{color:var(--ink);}
.slider-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:160px;}
.slider-wrap label{font-size:13px;color:var(--muted);white-space:nowrap;}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:999px;background:var(--line);flex:1;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--impact);border:3px solid var(--bg);cursor:pointer;}
.val{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ink);width:26px;text-align:right;}
.clips{padding:8px 16px max(18px,env(safe-area-inset-bottom));background:var(--bg);}
.clips-head{display:flex;align-items:center;justify-content:space-between;padding:10px 2px 12px;}
.clips-head h2{margin:0;font-size:14px;font-weight:700;}
.clips-head .count{font-family:"JetBrains Mono",monospace;color:var(--muted);font-size:12px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.clip{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;}
.clip .thumb{position:relative;aspect-ratio:3/4;background:#000;overflow:hidden;}
.clip .thumb img,.clip .thumb canvas{width:100%;height:100%;object-fit:cover;}
.clip .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.clip .play svg{width:52px;height:52px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.7));}
.clip .meta{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;font-size:12px;}
.clip .meta .t{font-family:"JetBrains Mono",monospace;color:var(--muted);}
.clip .acts{display:flex;gap:5px;padding:0 8px 8px;}
.clip .acts button{flex:1;padding:8px 6px;font-size:12px;border-radius:10px;}
.clip .acts .save{background:var(--impact);color:#0c1407;border-color:var(--impact);font-weight:700;}
.clip .acts .analyze{background:rgba(184,255,60,.12);color:var(--impact);border-color:rgba(184,255,60,.3);}
.clip .acts .del{background:transparent;color:var(--muted);border-color:var(--line);flex:0 0 40px;}
.empty-clips{color:var(--muted);font-size:13px;text-align:center;padding:26px 0 30px;line-height:1.6;}
/* クリップ全画面プレーヤー */
.player-modal{position:fixed;inset:0;z-index:300;background:#000;display:flex;align-items:center;justify-content:center;}
.player-modal video{width:100%;height:100%;object-fit:contain;}
.player-close{position:absolute;top:max(14px,env(safe-area-inset-top));right:14px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;padding:8px 16px;font-size:14px;font-weight:600;z-index:301;flex:none;}
/* 分析タブ */
.ana-upload{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px 20px;}
.u-box{border:2px dashed var(--line);border-radius:20px;padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:380px;cursor:pointer;text-align:center;transition:border-color .2s;}
.u-box:active{border-color:var(--impact);}
.u-note{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.35);color:#fde8b0;border-radius:12px;padding:10px 14px;font-size:13px;line-height:1.55;max-width:380px;width:100%;text-align:left;}
.u-btn{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:11px 24px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit;}
/* 分析ステージ（通常 & 全画面） */
.ana-stage{position:relative;flex:1;min-height:240px;background:#000;overflow:hidden;touch-action:none;}
.ana-stage.fs{position:fixed!important;inset:0!important;z-index:200!important;width:100vw!important;height:100dvh!important;min-height:unset!important;}
#anaVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;pointer-events:none;}
#anaCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
/* 全画面FAB */
.fs-fab{position:absolute;top:10px;right:10px;z-index:10;background:rgba(8,12,10,.65);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:10px;width:38px;height:38px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;flex:none;}
/* 全画面時オーバーレイコントロール */
.fs-overlay{position:absolute;bottom:0;left:0;right:0;z-index:15;background:rgba(8,12,10,.82);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:10px 13px max(16px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:7px;transition:opacity .25s,transform .25s;}
.fs-overlay.peek{opacity:0;transform:translateY(100%);pointer-events:none;}
.fs-zoom-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(8,12,10,.7);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:999px;padding:5px 14px;font-size:12px;color:var(--muted);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s;}
.fs-zoom-hint.show{opacity:1;}
/* 再生バー */
.ana-playbar{display:flex;flex-direction:column;gap:7px;padding:9px 13px;background:var(--panel);border-top:1px solid var(--line);}
.seek-row{display:flex;align-items:center;gap:9px;}
.seek-row input{flex:1;}
.ana-time{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);white-space:nowrap;min-width:56px;text-align:right;}
.pbtn-row{display:flex;gap:5px;align-items:center;}
.play-pause{flex:0 0 46px;font-size:17px;padding:9px;}
.speed-btn{flex:1;padding:9px 4px;font-size:12px;border-radius:10px;}
.speed-btn.active{background:rgba(184,255,60,.18);color:var(--impact);border-color:rgba(184,255,60,.4);}
.step-row{display:flex;gap:5px;align-items:center;}
.step-lbl{font-size:11px;color:var(--muted);white-space:nowrap;flex:none;}
.step-btn{flex:1;padding:9px 4px;font-size:12px;border-radius:10px;}
.step-btn.active{background:rgba(184,255,60,.18);color:var(--impact);border-color:rgba(184,255,60,.4);}
.frame-nav{flex:0 0 42px;padding:9px;font-size:17px;border-radius:10px;}
.ios-note{font-size:11px;color:var(--muted);padding:1px 2px 0;}
.ana-tools{display:flex;align-items:center;gap:7px;padding:9px 13px;background:var(--panel);border-top:1px solid var(--line);flex-wrap:wrap;}
.tool-group{display:flex;gap:4px;}
.tool-btn{flex:0 0 40px;padding:9px;font-size:17px;border-radius:11px;}
.tool-btn.active{background:rgba(184,255,60,.18);color:var(--impact);border-color:rgba(184,255,60,.4);}
.color-group{display:flex;gap:5px;margin-left:2px;}
.color-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);cursor:pointer;flex:none;transition:transform .1s,border-color .15s;}
.color-dot.active{border-color:#fff;transform:scale(1.2);}
.ana-spacer{flex:1;}
.act-group{display:flex;gap:4px;}
.act-btn{padding:9px 11px;font-size:12px;border-radius:11px;flex:none;}
.act-btn.danger{color:var(--danger);border-color:rgba(255,107,94,.35);}
.sel-del{display:none;}
.sel-del.show{display:flex;}
/* 追跡パネル */
.ana-track{padding:9px 13px max(10px,env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px;}
.track-mode-row{display:flex;gap:6px;align-items:center;}
.mode-btn{flex:1;padding:9px 6px;font-size:12px;border-radius:11px;font-weight:600;}
.mode-btn.active{background:rgba(184,255,60,.18);color:var(--impact);border-color:rgba(184,255,60,.4);}
.gear-btn{flex:0 0 38px;padding:9px;font-size:16px;border-radius:11px;}
.api-panel{background:var(--panel-2);border:1px solid var(--line);border-radius:13px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.api-panel label{font-size:12px;color:var(--muted);}
.api-row{display:flex;gap:7px;}
.api-row input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:9px 12px;color:var(--ink);font-size:13px;font-family:inherit;}
.api-row input:focus{outline:none;border-color:var(--impact);}
.api-save{flex:0 0 auto;padding:9px 16px;font-size:13px;border-radius:10px;background:var(--impact);color:#0c1407;border-color:var(--impact);font-weight:700;}
.api-note{font-size:11px;color:var(--muted);line-height:1.5;}
.api-ok{font-size:11px;color:var(--impact);}
.track-state{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.track-big{background:rgba(184,255,60,.12);color:var(--impact);border:1px solid rgba(184,255,60,.4);padding:11px 18px;border-radius:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;flex:none;}
.track-big:active{transform:scale(.97);}
.progress-wrap{background:var(--panel-2);border-radius:999px;height:7px;overflow:hidden;flex:1;min-width:80px;}
.progress-fill{height:100%;background:var(--impact);width:0%;transition:width .4s;border-radius:999px;}
.prog-txt{font-size:12px;color:var(--muted);font-family:"JetBrains Mono",monospace;}
.shaft-note{font-size:11px;color:var(--muted);line-height:1.5;}
.warn{background:rgba(255,107,94,.1);border:1px solid rgba(255,107,94,.4);color:#ffd7d2;border-radius:12px;padding:11px 13px;font-size:13px;line-height:1.5;margin:10px 14px 0;}

<body>

<!-- クリップ全画面プレーヤー -->
<div class="player-modal hidden" id="playerModal">
  <video id="playerVideo" playsinline controls></video>
  <button class="player-close" id="playerClose">✕ 閉じる</button>
</div>

<header>
  <div class="brand"><span class="dot" id="liveDot"></span>Swing Clipper<span class="ver">v2.9</span></div>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="rec">録画</button>
    <button class="tab-btn" data-tab="ana">分析</button>

<script>
"use strict";
const $=id=>document.getElementById(id);

// ===== タブ =====
document.querySelectorAll(".tab-btn").forEach(b=>{b.onclick=()=>{document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".pane").forEach(x=>x.classList.add("hidden"));b.classList.add("active");$("pane-"+b.dataset.tab).classList.remove("hidden");};});

// ===== 録画タブ =====
const TARGET_MAX_DIM=540,BUF_FPS=18,POST_MS=1500,POST_FPS=25,COOLDOWN_MS=1500,MAX_CLIPS=12;
const els={stage:$("stage"),video:$("video"),status:$("status"),statusText:$("statusText"),cd:$("cd"),gauge:$("gauge"),gaugeFill:$("gaugeFill"),gaugeMark:$("gaugeMark"),flash:$("flash"),startBtn:$("startBtn"),flipBtn:$("flipBtn"),manualBtn:$("manualBtn"),stopBtn:$("stopBtn"),autoToggle:$("autoToggle"),sens:$("sens"),sensVal:$("sensVal"),preroll:$("preroll"),prerollVal:$("prerollVal"),grid:$("grid"),emptyClips:$("emptyClips"),clipCount:$("clipCount"),liveDot:$("liveDot"),compatWarn:$("compatWarn")};
let stream=null,running=false,facing="environment",recMode="idle",autoDetect=true,cooldownUntil=0,rafId=null;
const aC=document.createElement("canvas");aC.width=80;aC.height=60;const aCtx=aC.getContext("2d",{willReadFrequently:true});
let prevData=null,motion=0,motionSmooth=0;
const rC=document.createElement("canvas");const rCtx=rC.getContext("2d");
let buf=[],bufLen=0,bufHead=0,lastBufT=0,mime="";
const PREROLL_MS=()=>parseInt(els.preroll.value)*100;
function checkSupport(){const issues=[];if(!navigator.mediaDevices?.getUserMedia)issues.push("getUserMedia");if(typeof MediaRecorder==="undefined")issues.push("MediaRecorder");if(!document.createElement("canvas").captureStream)issues.push("captureStream");if(issues.length){els.compatWarn.classList.remove("hidden");els.compatWarn.innerHTML="非対応機能：<b>"+issues.join("・")+"</b>";}}
function pickMime(){const c=["video/mp4","video/mp4;codecs=avc1","video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"];for(const m of c){if(MediaRecorder.isTypeSupported?.(m))return m;}return"";}
async function startCamera(){try{if(stream)stream.getTracks().forEach(t=>t.stop());stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:facing},width:{ideal:1280},height:{ideal:720}},audio:false});els.video.srcObject=stream;await els.video.play();await new Promise(r=>{if(els.video.videoWidth)r();else els.video.onloadedmetadata=()=>r();});setupRec();running=true;recMode="idle";cooldownUntil=0;els.stage.classList.remove("empty");els.gauge.classList.remove("empty");els.liveDot.classList.add("live");els.startBtn.classList.add("hidden");els.stopBtn.classList.remove("hidden");els.flipBtn.disabled=false;els.manualBtn.disabled=false;setRecStatus();recLoop();}catch(e){let h="";if(window.self!==window.top)h="プレビュー枠ではカメラ使用不可。HTMLをHTTPSで開いてください。";else if(!window.isSecureContext)h="HTTPSが必要です。";else if(e.name==="NotAllowedError")h="カメラが拒否されています。";else h=e.message;els.compatWarn.classList.remove("hidden");els.compatWarn.textContent="カメラエラー:"+h;}}
function stopCamera(){running=false;recMode="idle";if(rafId)cancelAnimationFrame(rafId);if(stream)stream.getTracks().forEach(t=>t.stop());stream=null;els.video.srcObject=null;els.stage.classList.add("empty");els.gauge.classList.add("empty");els.liveDot.classList.remove("live");els.startBtn.classList.remove("hidden");els.stopBtn.classList.add("hidden");els.flipBtn.disabled=true;els.manualBtn.disabled=true;setRecStatus();}
function setupRec(){const vw=els.video.videoWidth,vh=els.video.videoHeight;const sc=Math.min(1,TARGET_MAX_DIM/Math.max(vw,vh));rC.width=Math.round(vw*sc);rC.height=Math.round(vh*sc);const mf=Math.ceil(PREROLL_MS()/1000*BUF_FPS)+4;buf=[];for(let i=0;i<mf;i++){const c=document.createElement("canvas");c.width=rC.width;c.height=rC.height;buf.push({canvas:c,ctx:c.getContext("2d"),t:0});}bufLen=0;bufHead=0;lastBufT=0;prevData=null;}
function recLoop(){if(!running)return;rafId=requestAnimationFrame(recLoop);if(recMode!=="idle")return;const now=performance.now();aCtx.drawImage(els.video,0,0,80,60);const cur=aCtx.getImageData(0,0,80,60).data;if(prevData){let d=0;for(let i=0;i<cur.length;i+=4)d+=Math.abs(cur[i]-prevData[i]);motion=Math.min(100,(d/(cur.length/4))*2.4);}prevData=cur;motionSmooth=motionSmooth*.55+motion*.45;els.gaugeFill.style.height=motionSmooth+"%";const s=parseInt(els.sens.value),thr=70-s*5.5;els.gaugeMark.style.bottom=thr+"%";if(now-lastBufT>=1000/BUF_FPS){const sl=buf[bufHead];sl.ctx.drawImage(els.video,0,0,rC.width,rC.height);sl.t=now;bufHead=(bufHead+1)%buf.length;bufLen=Math.min(bufLen+1,buf.length);lastBufT=now;}if(autoDetect&&now>cooldownUntil&&motionSmooth>thr)captureClip();}
function collectPreroll(){const now=performance.now(),hor=now-PREROLL_MS(),out=[];for(let k=0;k<bufLen;k++){const idx=(bufHead-1-k+buf.length*2)%buf.length;const f=buf[idx];if(f.t>=hor)out.push(f);else break;}out.reverse();return out;}
const wait=ms=>new Promise(r=>setTimeout(r,ms));
async function captureClip(){if(recMode!=="idle"||!running)return;recMode="capturing";setRecStatus();els.flash.classList.remove("on");void els.flash.offsetWidth;els.flash.classList.add("on");const pr=collectPreroll();if(!mime)mime=pickMime();let recorder,chunks=[];try{const rs=rC.captureStream(POST_FPS);recorder=new MediaRecorder(rs,mime?{mimeType:mime}:undefined);}catch(e){alert("録画エラー:"+e.message);recMode="idle";setRecStatus();return;}recorder.ondataavailable=ev=>{if(ev.data&&ev.data.size>0)chunks.push(ev.data);};const done=new Promise(res=>{recorder.onstop=()=>res();});recorder.start();for(const f of pr){rCtx.drawImage(f.canvas,0,0);await wait(1000/BUF_FPS);}const pe=performance.now()+POST_MS;while(performance.now()<pe&&running){rCtx.drawImage(els.video,0,0,rC.width,rC.height);await wait(1000/POST_FPS);}recorder.stop();await done;const type=mime||(chunks[0]&&chunks[0].type)||"video/webm";const blob=new Blob(chunks,{type});addClip(blob,type);cooldownUntil=performance.now()+COOLDOWN_MS;motionSmooth=0;prevData=null;recMode="idle";setRecStatus();}

// クリップ全画面プレーヤー
$("playerClose").onclick=()=>{$("playerModal").classList.add("hidden");$("playerVideo").pause();$("playerVideo").src="";};
function openPlayer(url){$("playerVideo").src=url;$("playerModal").classList.remove("hidden");$("playerVideo").play().catch(()=>{});}

let clipSeq=0;
function addClip(blob,type){clipSeq++;const url=URL.createObjectURL(blob);const ext=type.includes("mp4")?"mp4":"webm";const now=new Date();const pad=x=>String(x).padStart(2,"0");const stamp=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;const fname=`swing_${stamp}.${ext}`;const tl=`${pad(now.getHours())}:${pad(now.getMinutes())}`;const sk=Math.round(blob.size/1024);
  const card=document.createElement("div");card.className="clip";
  // サムネイル用の静止画をcanvasで取得
  const thumbC=document.createElement("canvas");thumbC.style.cssText="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;";
  const tmpV=document.createElement("video");tmpV.src=url;tmpV.muted=true;tmpV.playsInline=true;
  tmpV.onloadeddata=()=>{tmpV.currentTime=0.1;};
  tmpV.onseeked=()=>{thumbC.width=tmpV.videoWidth||320;thumbC.height=tmpV.videoHeight||240;thumbC.getContext("2d").drawImage(tmpV,0,0);};
  card.innerHTML=`<div class="thumb"></div><div class="meta"><span>#${clipSeq}</span><span class="t">${tl}·${sk}KB</span></div><div class="acts"><button class="save">保存</button><button class="analyze">分析</button><button class="del">✕</button></div>`;
  const thumb=card.querySelector(".thumb");
  thumb.appendChild(thumbC);
  thumb.innerHTML+=`<div class="play"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,.4)"/><path d="M10 8l6 4-6 4z" fill="#fff"/></svg></div>`;
  // タップで全画面再生
  thumb.onclick=()=>openPlayer(url);
  card.querySelector(".save").onclick=e=>{e.stopPropagation();saveClip(blob,fname,type);};
  card.querySelector(".analyze").onclick=e=>{e.stopPropagation();loadAnaBlob(blob);document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab==="ana"));$("pane-rec").classList.add("hidden");$("pane-ana").classList.remove("hidden");};
  card.querySelector(".del").onclick=e=>{e.stopPropagation();URL.revokeObjectURL(url);card.remove();refreshClipUI();};
  els.grid.prepend(card);while(els.grid.children.length>MAX_CLIPS)els.grid.lastElementChild.remove();refreshClipUI();}
function refreshClipUI(){const n=els.grid.children.length;els.clipCount.textContent=n;els.grid.classList.toggle("hidden",n===0);els.emptyClips.classList.toggle("hidden",n!==0);}
async function saveClip(blob,fname,type){const file=new File([blob],fname,{type});if(navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title:fname});return;}catch(e){if(e.name==="AbortError")return;}}const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=fname;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),4000);}
function setRecStatus(){els.status.classList.remove("armed","rec");if(!running){els.statusText.textContent="停止中";els.cd.textContent="";return;}if(recMode==="capturing"){els.status.classList.add("rec");els.statusText.textContent="切り出し中";els.cd.textContent="";return;}if(autoDetect){els.status.classList.add("armed");els.statusText.textContent="検知待機";}else{els.statusText.textContent="手動モード";}els.cd.textContent="";}
setInterval(()=>{if(running&&recMode==="idle"){const l=cooldownUntil-performance.now();els.cd.textContent=l>0?(l/1000).toFixed(1)+"s":"";}},120);
els.startBtn.onclick=startCamera;els.stopBtn.onclick=stopCamera;
els.flipBtn.onclick=async()=>{facing=facing==="environment"?"user":"environment";if(running)await startCamera();};
els.manualBtn.onclick=()=>{if(running&&recMode==="idle")captureClip();};
els.autoToggle.onclick=()=>{autoDetect=!autoDetect;els.autoToggle.classList.toggle("on",autoDetect);setRecStatus();};
els.sens.oninput=()=>els.sensVal.textContent=els.sens.value;
els.preroll.oninput=()=>{els.prerollVal.textContent=(parseInt(els.preroll.value)/10).toFixed(1)+"s";if(running)setupRec();};

// ===== 分析タブ =====
const anaVideo=$("anaVideo"),anaCanvas=$("anaCanvas"),anaCtx2=anaCanvas.getContext("2d");
const zoom={scale:1,tx:0,ty:0};
const ana={tool:"cursor",color:"#ef4444",trackPoints:[],annotations:[],drawing:null,selectedIdx:-1,dragHandle:null,dragging:false,lastNx:0,lastNy:0};
let stepSize=0.05;
let isFs=false;
let fsControlsTimer=null;
let lastTap=0;


// ---- 座標系 ----
function getVideoBaseRect(){const cw=anaCanvas.width,ch=anaCanvas.height;const vw=anaVideo.videoWidth||1,vh=anaVideo.videoHeight||1;const s=Math.min(cw/vw,ch/vh);const w=vw*s,h=vh*s;return{left:(cw-w)/2,top:(ch-h)/2,width:w,height:h};}
function clientToNorm(cx,cy){const rect=anaCanvas.getBoundingClientRect();const sx=anaCanvas.width/rect.width,sy=anaCanvas.height/rect.height;const px=(cx-rect.left)*sx,py=(cy-rect.top)*sy;const bx=(px-zoom.tx)/zoom.scale,by=(py-zoom.ty)/zoom.scale;const b=getVideoBaseRect();return{nx:Math.max(0,Math.min(1,(bx-b.left)/b.width)),ny:Math.max(0,Math.min(1,(by-b.top)/b.height))};}
function normToBase(nx,ny){const b=getVideoBaseRect();return{x:b.left+nx*b.width,y:b.top+ny*b.height};}
function getTouchDist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}

// ---- ズームリセット（scale=1なら必ずtx=ty=0）----
function clampZoom(){
  if(!isFinite(zoom.scale)||isNaN(zoom.scale))zoom.scale=1;
  zoom.scale=Math.max(1,Math.min(4,zoom.scale));
  if(!isFinite(zoom.tx))zoom.tx=0;
  if(!isFinite(zoom.ty))zoom.ty=0;
  if(zoom.scale<=1.001){zoom.scale=1;zoom.tx=0;zoom.ty=0;return;}
  const b=getVideoBaseRect(),s=zoom.scale;
  const cw=anaCanvas.width,ch=anaCanvas.height;
  // 画面上での動画矩形の左上・サイズ
  const contentW=s*b.width, contentH=s*b.height;
  const baseLeft=s*b.left, baseTop=s*b.top; // translate前のscale適用済みオフセット
  // 動画左端(=tx+baseLeft)は0以下、右端(=tx+baseLeft+contentW)はcw以上でなければならない
  // → tx <= -baseLeft  かつ  tx >= cw - baseLeft - contentW
  const txMax=-baseLeft;
  const txMin=cw-baseLeft-contentW;
  const tyMax=-baseTop;
  const tyMin=ch-baseTop-contentH;
  // min<=maxのはず（scale>1なので）。念のためクランプ
  zoom.tx=Math.min(txMax,Math.max(txMin,zoom.tx));
  zoom.ty=Math.min(tyMax,Math.max(tyMin,zoom.ty));
}

// ---- ヒット判定 ----
function distToSegPx(nx,ny,nx1,ny1,nx2,ny2,b){const px=nx*b.width,py=ny*b.height,x1=nx1*b.width,y1=ny1*b.height,x2=nx2*b.width,y2=ny2*b.height,dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;if(l2===0)return Math.hypot(px-x1,py-y1);const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/l2));return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));}
function hitTestAnnotations(nx,ny){const b=getVideoBaseRect(),THR=14;for(let i=ana.annotations.length-1;i>=0;i--){const a=ana.annotations[i];if(a.type==="line"){if(distToSegPx(nx,ny,a.nx1,a.ny1,a.nx2,a.ny2,b)<THR)return i;}else if(a.type==="circle"){const dx=(nx-a.ncx)*b.width,dy=(ny-a.ncy)*b.height,d=Math.hypot(dx,dy),r=a.nr*b.width;if(d<THR||Math.abs(d-r)<THR)return i;}}return -1;}
function hitTestHandles(nx,ny){if(ana.selectedIdx<0)return null;const a=ana.annotations[ana.selectedIdx],b=getVideoBaseRect(),T=16,h=(hx,hy)=>Math.hypot((nx-hx)*b.width,(ny-hy)*b.height);if(a.type==="line"){if(h(a.nx1,a.ny1)<T)return"p1";if(h(a.nx2,a.ny2)<T)return"p2";}else if(a.type==="circle"){if(h(a.ncx,a.ncy)<T)return"center";if(h(a.ncx+a.nr,a.ncy)<T)return"rim";}return null;}

// ---- RAF描画 ----
function syncCanvas(){const s=$("anaStage"),w=s.clientWidth||1,h=s.clientHeight||1;if(anaCanvas.width!==w||anaCanvas.height!==h){anaCanvas.width=w;anaCanvas.height=h;}}
function startAnaRaf(){
  if(ana.rafId)cancelAnimationFrame(ana.rafId);
  function render(){
    ana.rafId=requestAnimationFrame(render);syncCanvas();
    const ctx=anaCtx2;ctx.clearRect(0,0,anaCanvas.width,anaCanvas.height);
    ctx.save();ctx.translate(zoom.tx,zoom.ty);ctx.scale(zoom.scale,zoom.scale);
    if(anaVideo.videoWidth>0){const b=getVideoBaseRect();try{ctx.drawImage(anaVideo,b.left,b.top,b.width,b.height);}catch(err){}}
    const T=anaVideo.currentTime,pts=ana.trackPoints.filter(p=>p.t<=T+.001).sort((a,b)=>a.t-b.t);
    if(pts.length>=2){ctx.beginPath();const p0=normToBase(pts[0].nx,pts[0].ny);ctx.moveTo(p0.x,p0.y);for(let i=1;i<pts.length;i++){const p=normToBase(pts[i].nx,pts[i].ny);ctx.lineTo(p.x,p.y);}ctx.strokeStyle=ana.color;ctx.lineWidth=3;ctx.lineJoin="round";ctx.lineCap="round";ctx.shadowColor=ana.color;ctx.shadowBlur=5;ctx.stroke();ctx.shadowBlur=0;}
    for(const p of pts){const{x,y}=normToBase(p.nx,p.ny);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=ana.color;ctx.fill();}
    for(let i=0;i<ana.annotations.length;i++){const a=ana.annotations[i];ctx.strokeStyle=a.color;ctx.lineWidth=i===ana.selectedIdx?3.5:2.5;ctx.lineCap="round";ctx.shadowColor=a.color;ctx.shadowBlur=3;if(a.type==="line"){const{x:x1,y:y1}=normToBase(a.nx1,a.ny1);const{x:x2,y:y2}=normToBase(a.nx2,a.ny2);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}else if(a.type==="circle"){const{x:cx,y:cy}=normToBase(a.ncx,a.ncy);const b=getVideoBaseRect();ctx.beginPath();ctx.arc(cx,cy,Math.max(1,a.nr*b.width),0,Math.PI*2);ctx.stroke();}ctx.shadowBlur=0;}
    if(ana.selectedIdx>=0&&ana.selectedIdx<ana.annotations.length){const a=ana.annotations[ana.selectedIdx],b=getVideoBaseRect();ctx.setLineDash([5,4]);ctx.strokeStyle=a.color;ctx.lineWidth=1.5;if(a.type==="line"){const{x:x1,y:y1}=normToBase(a.nx1,a.ny1);const{x:x2,y:y2}=normToBase(a.nx2,a.ny2);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}else if(a.type==="circle"){const{x:cx,y:cy}=normToBase(a.ncx,a.ncy);ctx.beginPath();ctx.arc(cx,cy,Math.max(1,a.nr*b.width),0,Math.PI*2);ctx.stroke();}ctx.setLineDash([]);const handles=a.type==="line"?[{nx:a.nx1,ny:a.ny1},{nx:a.nx2,ny:a.ny2}]:[{nx:a.ncx,ny:a.ncy},{nx:a.ncx+a.nr,ny:a.ncy}];for(const h of handles){const{x,y}=normToBase(h.nx,h.ny);ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.strokeStyle=a.color;ctx.lineWidth=2;ctx.stroke();}}
    if(ana.drawing){const d=ana.drawing;ctx.strokeStyle=ana.color;ctx.lineWidth=2.5;ctx.lineCap="round";ctx.setLineDash([6,4]);if(d.type==="line"){const{x:x1,y:y1}=normToBase(d.nx1,d.ny1);const{x:x2,y:y2}=normToBase(d.nx2??d.nx1,d.ny2??d.ny1);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}else if(d.type==="circle"){const{x:cx,y:cy}=normToBase(d.ncx,d.ncy);const b=getVideoBaseRect();ctx.beginPath();ctx.arc(cx,cy,Math.max(1,(d.nr??0)*b.width),0,Math.PI*2);ctx.stroke();}ctx.setLineDash([]);}

    updateAnaTime();
  }
  render();
}
function updateAnaTime(){
  if(!isNaN(anaVideo.duration)&&anaVideo.duration>0){
    const v=(anaVideo.currentTime/anaVideo.duration)*1000;
    $("anaSeek").value=v;$("fsSeek").value=v;
    const m=Math.floor(anaVideo.currentTime/60),s=(anaVideo.currentTime%60).toFixed(1).padStart(4,"0");
    const t=`${m}:${s}`;$("anaTime").textContent=t;$("fsTime").textContent=t;
  }
}

// ---- ピンチズーム（修正版：現在指中点でズーム＋パン）----


// ---- 統合ポインタ入力（Pointer Events一本化：2本=ピンチ, 1本=ツール）----
const activePointers=new Map(); // pointerId -> {cx,cy}
const gesture={mode:"none",startDist:0,startScale:1,startTx:0,startTy:0,startMidCx:0,startMidCy:0,downCx:0,downCy:0,moved:false};
const TAP_THR=8;

function canvasScale(){const r=anaCanvas.getBoundingClientRect();return{sx:anaCanvas.width/r.width,sy:anaCanvas.height/r.height,rect:r};}
function twoPointerData(){
  const pts=[...activePointers.values()];
  const dist=Math.hypot(pts[0].cx-pts[1].cx,pts[0].cy-pts[1].cy);
  const midCx=(pts[0].cx+pts[1].cx)/2,midCy=(pts[0].cy+pts[1].cy)/2;
  return{dist,midCx,midCy};
}

anaCanvas.addEventListener("pointerdown",e=>{
  e.preventDefault();
  activePointers.set(e.pointerId,{cx:e.clientX,cy:e.clientY});

  if(activePointers.size===2){
    // ピンチ開始：進行中の描画/選択ドラッグを破棄
    ana.drawing=null;ana.dragging=false;ana.dragHandle=null;
    const{dist,midCx,midCy}=twoPointerData();
    gesture.mode="pinch";
    gesture.startDist=dist>10?dist:10;
    gesture.startScale=zoom.scale;
    gesture.startTx=zoom.tx;gesture.startTy=zoom.ty;
    const{sx,sy,rect}=canvasScale();
    gesture.startMidCx=(midCx-rect.left)*sx;
    gesture.startMidCy=(midCy-rect.top)*sy;
    return;
  }
  if(activePointers.size!==1)return;

  // 1本指：ツール or パン準備
  gesture.mode="single";gesture.moved=false;
  gesture.downCx=e.clientX;gesture.downCy=e.clientY;
  gesture.startTx=zoom.tx;gesture.startTy=zoom.ty;
  const{nx,ny}=clientToNorm(e.clientX,e.clientY);
  ana.lastNx=nx;ana.lastNy=ny;
  if(ana.tool==="line"){ana.drawing={type:"line",nx1:nx,ny1:ny,nx2:nx,ny2:ny};ana.dragging=true;}
  else if(ana.tool==="circle"){ana.drawing={type:"circle",ncx:nx,ncy:ny,nr:0};ana.dragging=true;}
  else if(ana.tool==="cursor"){const handle=hitTestHandles(nx,ny);if(handle){ana.dragHandle=handle;ana.dragging=true;}}
});

anaCanvas.addEventListener("pointermove",e=>{
  if(!activePointers.has(e.pointerId))return;
  e.preventDefault();
  activePointers.set(e.pointerId,{cx:e.clientX,cy:e.clientY});

  // ピンチ処理（中心固定・累積なし）
  if(gesture.mode==="pinch"&&activePointers.size>=2){
    const{dist,midCx,midCy}=twoPointerData();
    let ns=gesture.startScale*(dist/gesture.startDist);
    if(!isFinite(ns)||isNaN(ns))ns=gesture.startScale;
    ns=Math.max(1,Math.min(4,ns));
    const{sx,rect}=canvasScale();
    const mX=(midCx-rect.left)*sx,mY=(midCy-rect.top)*sx;
    // 開始中点の下にあったコンテンツ座標を、現在中点に合わせて固定
    const cX=(gesture.startMidCx-gesture.startTx)/gesture.startScale;
    const cY=(gesture.startMidCy-gesture.startTy)/gesture.startScale;
    zoom.scale=ns;
    zoom.tx=mX-cX*ns;
    zoom.ty=mY-cY*ns;
    clampZoom();
    return;
  }
  if(gesture.mode!=="single")return;

  const{nx,ny}=clientToNorm(e.clientX,e.clientY);
  const dx=e.clientX-gesture.downCx,dy=e.clientY-gesture.downCy;
  if(!gesture.moved&&Math.hypot(dx,dy)>TAP_THR)gesture.moved=true;

  // ハンドルドラッグ
  if(ana.tool==="cursor"&&ana.dragging&&ana.dragHandle&&ana.selectedIdx>=0){
    const a=ana.annotations[ana.selectedIdx],dnx=nx-ana.lastNx,dny=ny-ana.lastNy;
    if(a.type==="line"){if(ana.dragHandle==="p1"){a.nx1+=dnx;a.ny1+=dny;}else if(ana.dragHandle==="p2"){a.nx2+=dnx;a.ny2+=dny;}}
    else if(a.type==="circle"){if(ana.dragHandle==="center"){a.ncx+=dnx;a.ncy+=dny;}else if(ana.dragHandle==="rim"){const b=getVideoBaseRect();a.nr=Math.hypot((nx-a.ncx)*b.width,(ny-a.ncy)*b.height)/b.width;}}
    ana.lastNx=nx;ana.lastNy=ny;return;
  }
  // 図形描画
  if(ana.drawing){
    if(ana.drawing.type==="line"){ana.drawing.nx2=nx;ana.drawing.ny2=ny;}
    else if(ana.drawing.type==="circle"){const b=getVideoBaseRect();ana.drawing.nr=Math.hypot((nx-ana.drawing.ncx)*b.width,(ny-ana.drawing.ncy)*b.height)/b.width;}
    ana.lastNx=nx;ana.lastNy=ny;return;
  }
  // 1本指パン（ズーム中・カーソルツール時のみ）
  if(gesture.moved&&zoom.scale>1.01&&ana.tool==="cursor"){
    const{sx,sy}=canvasScale();
    zoom.tx=gesture.startTx+dx*sx;
    zoom.ty=gesture.startTy+dy*sy;
    clampZoom();
  }
  ana.lastNx=nx;ana.lastNy=ny;
});

function endPointer(e){
  activePointers.delete(e.pointerId);
  // 図形確定
  if(ana.drawing){
    const b=getVideoBaseRect();let ok=false;
    if(ana.drawing.type==="line"){const dx=(ana.drawing.nx2-ana.drawing.nx1)*b.width,dy=(ana.drawing.ny2-ana.drawing.ny1)*b.height;ok=Math.hypot(dx,dy)>6;}
    else if(ana.drawing.type==="circle")ok=(ana.drawing.nr??0)*b.width>5;
    if(ok)ana.annotations.push({...ana.drawing,color:ana.color});
    ana.drawing=null;
  }
  // タップ判定（カーソルツールで動いていない→選択 or パネル閉じ）
  if(gesture.mode==="single"&&!gesture.moved&&ana.tool==="cursor"){
    const{nx,ny}=clientToNorm(e.clientX,e.clientY);
    const idx=hitTestAnnotations(nx,ny);
    if(idx>=0){ana.selectedIdx=idx;updateSelDeleteBtn();}
    else{
      ana.selectedIdx=-1;updateSelDeleteBtn();
      // 全画面でパネル開いてたら閉じる
      if(isFs&&!$("fsDrawer").classList.contains("hidden-drawer")){$("fsDrawer").classList.add("hidden-drawer");$("fsPanelToggle").classList.remove("on");setTimeout(syncCanvas,60);}
    }
  }
  ana.dragging=false;ana.dragHandle=null;
  // 残りポインタで状態リセット
  if(activePointers.size===0){gesture.mode="none";clampZoom();}
  else if(activePointers.size===1){gesture.mode="single";gesture.moved=true;const p=[...activePointers.values()][0];gesture.downCx=p.cx;gesture.downCy=p.cy;gesture.startTx=zoom.tx;gesture.startTy=zoom.ty;}
}
anaCanvas.addEventListener("pointerup",e=>{e.preventDefault();endPointer(e);});
anaCanvas.addEventListener("pointercancel",e=>{endPointer(e);});
